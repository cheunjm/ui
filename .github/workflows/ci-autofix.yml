name: CI Autofix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  autofix:
    uses: aramiworks/.github/.github/workflows/ci-autofix.yml@main
    with:
      format_fix_command: "npx prettier --write '**/*.{ts,tsx,md,json}'"
      lint_fix_command: "npx eslint --fix ."
      node_version: "20"
    secrets: inherit
