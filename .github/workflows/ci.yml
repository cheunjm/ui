name: CI
# Native visual regression with EAS build + simctl screenshots

on:
  workflow_dispatch:
  push:
    branches: [main, develop, stage]
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

jobs:
  lint-type-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Lint
        run: doppler run -- npm run lint

      - name: Typecheck
        run: doppler run -- npm run typecheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Run unit tests
        run: doppler run -- npm test -- --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Comment on PR with coverage summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/coverage-summary.json';
            const marker = '<!-- coverage-comment -->';
            let body = marker + '\n';

            if (!fs.existsSync(summaryPath)) {
              body += '### :bar_chart: Coverage\nCoverage report not found — tests may have failed before generating coverage.';
            } else {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              const total = summary.total;

              const fmt = (metric) => `${metric.pct}% (${metric.covered}/${metric.total})`;

              body += '### :bar_chart: Coverage Summary\n\n';
              body += '| Metric | Coverage | Covered/Total |\n';
              body += '|--------|----------|---------------|\n';
              body += `| Statements | ${total.statements.pct}% | ${total.statements.covered}/${total.statements.total} |\n`;
              body += `| Branches | ${total.branches.pct}% | ${total.branches.covered}/${total.branches.total} |\n`;
              body += `| Functions | ${total.functions.pct}% | ${total.functions.covered}/${total.functions.total} |\n`;
              body += `| Lines | ${total.lines.pct}% | ${total.lines.covered}/${total.lines.total} |\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  visual-baseline:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Build Storybook
        run: doppler run -- npm run storybook:build

      - name: Generate baseline screenshots
        uses: lost-pixel/lost-pixel@v3.22.0
        env:
          LOST_PIXEL_MODE: update

      - name: Save baselines to cache
        uses: actions/cache/save@v4
        with:
          path: .lostpixel/baseline/
          key: lost-pixel-baselines-${{ github.sha }}

  visual-regression:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Build Storybook
        run: doppler run -- npm run storybook:build

      - name: Restore baselines from cache
        uses: actions/cache/restore@v4
        with:
          path: .lostpixel/baseline/
          key: lost-pixel-baselines-
          restore-keys: |
            lost-pixel-baselines-

      - name: Run Lost Pixel comparison
        id: lostpixel
        uses: lost-pixel/lost-pixel@v3.22.0
        env:
          LOST_PIXEL_GENERATE_META: "true"
        continue-on-error: true

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lost-pixel-diffs
          path: |
            .lostpixel/current/
            .lostpixel/difference/

      - name: Comment on PR with visual diff summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metaPath = '.lostpixel/current/meta.json';
            const marker = '<!-- lost-pixel-comment -->';
            let body = marker + '\n';

            const lpResult = '${{ steps.lostpixel.outcome }}';

            if (lpResult === 'success') {
              body += '### :white_check_mark: Visual Regression — No Changes\n';
              body += 'All screenshots match the baseline.';
            } else {
              body += '### :warning: Visual Regression — Changes Detected\n\n';

              if (fs.existsSync(metaPath)) {
                const meta = JSON.parse(fs.readFileSync(metaPath, 'utf8'));
                const entries = Object.entries(meta);
                const changed = entries.filter(([, v]) => !v.isWithinThreshold);
                const withinThreshold = entries.filter(([, v]) => v.isWithinThreshold && v.pixelDifference > 0);

                body += '| Shot | Pixel Diff | % Diff | Status |\n';
                body += '|------|-----------|--------|--------|\n';
                for (const [name, data] of entries) {
                  const pct = (data.pixelDifferencePercentage * 100).toFixed(2);
                  const status = data.isWithinThreshold ? ':yellow_circle: Within threshold' : ':red_circle: Changed';
                  body += `| \`${name}\` | ${data.pixelDifference} | ${pct}% | ${status} |\n`;
                }

                body += `\n**${changed.length} shot(s) changed** beyond threshold.`;
                if (withinThreshold.length > 0) {
                  body += ` ${withinThreshold.length} within threshold.`;
                }
              } else {
                const baselineExists = fs.existsSync('.lostpixel/baseline');
                if (!baselineExists) {
                  body += ':information_source: No baselines found — this is expected for the first PR after enabling visual regression.\n';
                  body += 'Baselines will be generated when this PR merges to main.';
                } else {
                  body += 'Could not find `meta.json`. Check the `lost-pixel-diffs` artifact for diff images.';
                }
              }

              body += '\n\nDownload the **lost-pixel-diffs** artifact to review diff images.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  e2e-web:
    runs-on: ubuntu-latest
    needs: [lint-type-build, unit-test]
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Wrap Chrome for headless CI
        run: |
          sudo mv /usr/bin/google-chrome /usr/bin/google-chrome.original
          printf '#!/bin/sh\nexec /usr/bin/google-chrome.original "$@" --no-sandbox --headless=new --disable-dev-shm-usage --disable-gpu\n' | sudo tee /usr/bin/google-chrome
          sudo chmod +x /usr/bin/google-chrome

      - name: Build Storybook
        run: doppler run -- npm run storybook:build

      - name: Serve Storybook and run E2E
        id: e2e
        continue-on-error: true
        run: |
          npx http-server storybook-static -p 6006 &
          sleep 5
          mkdir -p e2e-results
          doppler run -- maestro test --platform web --format junit --output e2e-results/results.xml e2e/integration/ e2e/journeys/

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results/

      - name: Comment on PR with E2E results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xmlPath = 'e2e-results/results.xml';
            const marker = '<!-- e2e-comment -->';
            let body = marker + '\n';

            const e2eResult = '${{ steps.e2e.outcome }}';

            if (e2eResult === 'success') {
              body += '### :white_check_mark: E2E Tests — All Passed\n';
            } else {
              body += '### :x: E2E Tests — Failures Detected\n\n';
            }

            if (fs.existsSync(xmlPath)) {
              const xml = fs.readFileSync(xmlPath, 'utf8');

              // Parse JUnit XML for test counts
              const suitesMatch = xml.match(/testsuite[^>]+tests="(\d+)"[^>]+failures="(\d+)"/g) || [];
              let totalTests = 0, totalFailures = 0;
              for (const s of suitesMatch) {
                const tests = s.match(/tests="(\d+)"/);
                const failures = s.match(/failures="(\d+)"/);
                if (tests) totalTests += parseInt(tests[1]);
                if (failures) totalFailures += parseInt(failures[1]);
              }
              const totalPassed = totalTests - totalFailures;

              body += `**${totalPassed}/${totalTests}** tests passed`;
              if (totalFailures > 0) body += ` — **${totalFailures} failed**`;
              body += '\n\n';

              // Extract individual test cases
              const testCases = [...xml.matchAll(/<testcase\s+name="([^"]+)"[^>]*(?:\s+time="([^"]+)")?[^>]*(?:\/>|>([\s\S]*?)<\/testcase>)/g)];

              if (testCases.length > 0) {
                body += '| Test | Duration | Status |\n';
                body += '|------|----------|--------|\n';
                for (const tc of testCases) {
                  const name = tc[1];
                  const time = tc[2] ? `${parseFloat(tc[2]).toFixed(1)}s` : '-';
                  const hasFailure = tc[3] && tc[3].includes('<failure');
                  const status = hasFailure ? ':red_circle: Failed' : ':green_circle: Passed';
                  body += `| \`${name}\` | ${time} | ${status} |\n`;
                }
              }
            } else {
              body += 'No test results file found. Maestro may have crashed before producing output.';
            }

            if (e2eResult !== 'success') {
              body += '\nDownload the **e2e-results** artifact for full details.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1

  visual-baseline-ios:
    continue-on-error: true
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: rm -rf node_modules && npm ci

      - name: Build standalone iOS app
        run: npx eas build --profile visual-test --platform ios --local --non-interactive --output build/ios-app.tar.gz

      - name: Boot simulator, install and launch
        run: |
          xcrun simctl boot "iPhone 15 Pro" 2>/dev/null || true
          xcrun simctl bootstatus "iPhone 15 Pro" -b
          mkdir -p build/ios-extracted
          tar xzf build/ios-app.tar.gz -C build/ios-extracted
          APP_PATH=$(find build/ios-extracted -name "*.app" -maxdepth 1 | head -1)
          xcrun simctl uninstall "iPhone 15 Pro" com.aramiworks.ui.storybook 2>/dev/null || true
          xcrun simctl install "iPhone 15 Pro" "$APP_PATH"
          xcrun simctl launch "iPhone 15 Pro" com.aramiworks.ui.storybook
          sleep 10

      - name: Take screenshots
        run: |
          mkdir -p .lostpixel-ios/baseline
          bash scripts/ios-visual-screenshots.sh "$(xcrun simctl list devices booted | grep 'iPhone 15 Pro' | grep -oE '[0-9A-F-]{36}' | head -1)" .lostpixel-ios/baseline

      - name: Save iOS baselines to cache
        uses: actions/cache/save@v4
        with:
          path: .lostpixel-ios/baseline/
          key: lost-pixel-baselines-ios-${{ github.sha }}

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown all 2>/dev/null || true

  visual-regression-ios:
    continue-on-error: true
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: rm -rf node_modules && npm ci

      - name: Build standalone iOS app
        run: npx eas build --profile visual-test --platform ios --local --non-interactive --output build/ios-app.tar.gz

      - name: Boot simulator, install and launch
        run: |
          xcrun simctl boot "iPhone 15 Pro" 2>/dev/null || true
          xcrun simctl bootstatus "iPhone 15 Pro" -b
          mkdir -p build/ios-extracted
          tar xzf build/ios-app.tar.gz -C build/ios-extracted
          APP_PATH=$(find build/ios-extracted -name "*.app" -maxdepth 1 | head -1)
          xcrun simctl uninstall "iPhone 15 Pro" com.aramiworks.ui.storybook 2>/dev/null || true
          xcrun simctl install "iPhone 15 Pro" "$APP_PATH"
          xcrun simctl launch "iPhone 15 Pro" com.aramiworks.ui.storybook
          sleep 10

      - name: Restore iOS baselines from cache
        uses: actions/cache/restore@v4
        with:
          path: .lostpixel-ios/baseline/
          key: lost-pixel-baselines-ios-
          restore-keys: |
            lost-pixel-baselines-ios-

      - name: Take screenshots
        id: ios_screenshots
        continue-on-error: true
        run: |
          UDID=$(xcrun simctl list devices booted | grep 'iPhone 15 Pro' | grep -oE '[0-9A-F-]{36}' | head -1)
          mkdir -p .lostpixel-ios/current
          bash scripts/ios-visual-screenshots.sh "$UDID" .lostpixel-ios/current

      - name: Compare iOS screenshots
        id: ios_diff
        continue-on-error: true
        run: |
          mkdir -p .lostpixel-ios/difference
          node -e "
            const fs = require('fs');
            const path = require('path');
            const baselineDir = '.lostpixel-ios/baseline';
            const currentDir = '.lostpixel-ios/current';
            const diffDir = '.lostpixel-ios/difference';
            const results = {};

            if (!fs.existsSync(baselineDir) || fs.readdirSync(baselineDir).length === 0) {
              console.log('No baselines found — skipping comparison');
              fs.writeFileSync('.lostpixel-ios/meta.json', JSON.stringify({ _noBaselines: true }));
              process.exit(0);
            }

            const baselineFiles = fs.readdirSync(baselineDir).filter(f => f.endsWith('.png'));
            const currentFiles = fs.readdirSync(currentDir).filter(f => f.endsWith('.png'));
            let hasChanges = false;

            for (const file of new Set([...baselineFiles, ...currentFiles])) {
              const bPath = path.join(baselineDir, file);
              const cPath = path.join(currentDir, file);
              const name = file.replace('.png', '');

              if (!fs.existsSync(bPath)) {
                results[name] = { status: 'new', pixelDifference: 0, pixelDifferencePercentage: 0 };
                hasChanges = true;
              } else if (!fs.existsSync(cPath)) {
                results[name] = { status: 'removed', pixelDifference: 0, pixelDifferencePercentage: 0 };
                hasChanges = true;
              } else {
                const b = fs.readFileSync(bPath);
                const c = fs.readFileSync(cPath);
                if (Buffer.compare(b, c) !== 0) {
                  results[name] = { status: 'changed', pixelDifference: -1, pixelDifferencePercentage: -1 };
                  fs.copyFileSync(cPath, path.join(diffDir, file));
                  hasChanges = true;
                } else {
                  results[name] = { status: 'unchanged', pixelDifference: 0, pixelDifferencePercentage: 0 };
                }
              }
            }

            fs.writeFileSync('.lostpixel-ios/meta.json', JSON.stringify(results, null, 2));
            if (hasChanges) process.exit(1);
          "

      - name: Upload iOS visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lost-pixel-diffs-ios
          path: |
            .lostpixel-ios/current/
            .lostpixel-ios/difference/

      - name: Comment on PR with iOS visual diff
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metaPath = '.lostpixel-ios/meta.json';
            const marker = '<!-- lost-pixel-ios-comment -->';
            let body = marker + '\n';

            const diffResult = '${{ steps.ios_diff.outcome }}';
            const screenshotResult = '${{ steps.ios_screenshots.outcome }}';

            if (screenshotResult !== 'success') {
              body += '### :iphone: iOS Visual Regression — Screenshot Failed\n';
              body += 'Maestro screenshot flow failed. Check the `lost-pixel-diffs-ios` artifact.';
            } else if (diffResult === 'success') {
              body += '### :iphone: iOS Visual Regression — No Changes\n';
              body += 'All iOS screenshots match the baseline.';
            } else if (fs.existsSync(metaPath)) {
              const meta = JSON.parse(fs.readFileSync(metaPath, 'utf8'));

              if (meta._noBaselines) {
                body += '### :iphone: iOS Visual Regression\n';
                body += ':information_source: No baselines found — expected for first PR. Baselines generated on merge to main.';
              } else {
                body += '### :warning: iOS Visual Regression — Changes Detected\n\n';
                const entries = Object.entries(meta);
                const changed = entries.filter(([, v]) => v.status !== 'unchanged');

                body += '| Shot | Status |\n';
                body += '|------|--------|\n';
                for (const [name, data] of entries) {
                  let status = ':green_circle: Unchanged';
                  if (data.status === 'changed') status = ':red_circle: Changed';
                  else if (data.status === 'new') status = ':blue_circle: New';
                  else if (data.status === 'removed') status = ':white_circle: Removed';
                  body += `| \`${name}\` | ${status} |\n`;
                }

                body += `\n**${changed.length} shot(s) changed.** Download **lost-pixel-diffs-ios** artifact for details.`;
              }
            } else {
              body += '### :iphone: iOS Visual Regression\n';
              body += 'No comparison data available.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown all 2>/dev/null || true

  visual-baseline-android:
    # TODO: remove continue-on-error after INF-421 (worklets/reanimated fix) + AVD setup
    continue-on-error: true
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: rm -rf node_modules && npm ci

      - name: Start Android emulator
        run: |
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          export PATH="$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$PATH"
          emulator -avd Pixel_7_API_34 -no-window -no-audio -no-boot-anim &
          adb wait-for-device
          adb shell input keyevent 82

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Android app
        run: npx expo run:android

      - name: Run visual screenshot flow
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p .lostpixel-android/baseline
          maestro test --platform android e2e/visual/screenshot-all-stories-android.yaml
          cp -f ~/.maestro/tests/*/screenshots/*.png .lostpixel-android/baseline/ 2>/dev/null || true

      - name: Save Android baselines to cache
        uses: actions/cache/save@v4
        with:
          path: .lostpixel-android/baseline/
          key: lost-pixel-baselines-android-${{ github.sha }}

      - name: Kill emulator
        if: always()
        run: adb emu kill 2>/dev/null || true

  visual-regression-android:
    # TODO: remove continue-on-error after INF-421 (worklets/reanimated fix) + AVD setup
    continue-on-error: true
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: rm -rf node_modules && npm ci

      - name: Start Android emulator
        run: |
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          export PATH="$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$PATH"
          emulator -avd Pixel_7_API_34 -no-window -no-audio -no-boot-anim &
          adb wait-for-device
          adb shell input keyevent 82

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Android app
        run: npx expo run:android

      - name: Restore Android baselines from cache
        uses: actions/cache/restore@v4
        with:
          path: .lostpixel-android/baseline/
          key: lost-pixel-baselines-android-
          restore-keys: |
            lost-pixel-baselines-android-

      - name: Run visual screenshot flow
        id: android_screenshots
        continue-on-error: true
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p .lostpixel-android/current
          maestro test --platform android e2e/visual/screenshot-all-stories-android.yaml
          cp -f ~/.maestro/tests/*/screenshots/*.png .lostpixel-android/current/ 2>/dev/null || true

      - name: Compare Android screenshots
        id: android_diff
        continue-on-error: true
        run: |
          mkdir -p .lostpixel-android/difference
          node -e "
            const fs = require('fs');
            const path = require('path');
            const baselineDir = '.lostpixel-android/baseline';
            const currentDir = '.lostpixel-android/current';
            const diffDir = '.lostpixel-android/difference';
            const results = {};

            if (!fs.existsSync(baselineDir) || fs.readdirSync(baselineDir).length === 0) {
              fs.writeFileSync('.lostpixel-android/meta.json', JSON.stringify({ _noBaselines: true }));
              process.exit(0);
            }

            const baselineFiles = fs.readdirSync(baselineDir).filter(f => f.endsWith('.png'));
            const currentFiles = fs.readdirSync(currentDir).filter(f => f.endsWith('.png'));
            let hasChanges = false;

            for (const file of new Set([...baselineFiles, ...currentFiles])) {
              const bPath = path.join(baselineDir, file);
              const cPath = path.join(currentDir, file);
              const name = file.replace('.png', '');

              if (!fs.existsSync(bPath)) {
                results[name] = { status: 'new' };
                hasChanges = true;
              } else if (!fs.existsSync(cPath)) {
                results[name] = { status: 'removed' };
                hasChanges = true;
              } else {
                const b = fs.readFileSync(bPath);
                const c = fs.readFileSync(cPath);
                if (Buffer.compare(b, c) !== 0) {
                  results[name] = { status: 'changed' };
                  fs.copyFileSync(cPath, path.join(diffDir, file));
                  hasChanges = true;
                } else {
                  results[name] = { status: 'unchanged' };
                }
              }
            }

            fs.writeFileSync('.lostpixel-android/meta.json', JSON.stringify(results, null, 2));
            if (hasChanges) process.exit(1);
          "

      - name: Upload Android visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lost-pixel-diffs-android
          path: |
            .lostpixel-android/current/
            .lostpixel-android/difference/

      - name: Comment on PR with Android visual diff
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metaPath = '.lostpixel-android/meta.json';
            const marker = '<!-- lost-pixel-android-comment -->';
            let body = marker + '\n';

            const diffResult = '${{ steps.android_diff.outcome }}';
            const screenshotResult = '${{ steps.android_screenshots.outcome }}';

            if (screenshotResult !== 'success') {
              body += '### :robot: Android Visual Regression — Screenshot Failed\n';
              body += 'Maestro screenshot flow failed. Check the `lost-pixel-diffs-android` artifact.';
            } else if (diffResult === 'success') {
              body += '### :robot: Android Visual Regression — No Changes\n';
              body += 'All Android screenshots match the baseline.';
            } else if (fs.existsSync(metaPath)) {
              const meta = JSON.parse(fs.readFileSync(metaPath, 'utf8'));

              if (meta._noBaselines) {
                body += '### :robot: Android Visual Regression\n';
                body += ':information_source: No baselines found — expected for first PR. Baselines generated on merge to main.';
              } else {
                body += '### :warning: Android Visual Regression — Changes Detected\n\n';
                const entries = Object.entries(meta);
                const changed = entries.filter(([, v]) => v.status !== 'unchanged');

                body += '| Shot | Status |\n';
                body += '|------|--------|\n';
                for (const [name, data] of entries) {
                  let status = ':green_circle: Unchanged';
                  if (data.status === 'changed') status = ':red_circle: Changed';
                  else if (data.status === 'new') status = ':blue_circle: New';
                  else if (data.status === 'removed') status = ':white_circle: Removed';
                  body += `| \`${name}\` | ${status} |\n`;
                }

                body += `\n**${changed.length} shot(s) changed.** Download **lost-pixel-diffs-android** artifact for details.`;
              }
            } else {
              body += '### :robot: Android Visual Regression\n';
              body += 'No comparison data available.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Kill emulator
        if: always()
        run: adb emu kill 2>/dev/null || true
