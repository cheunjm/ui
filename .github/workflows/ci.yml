name: CI
# Native visual regression with EAS build + simctl screenshots

on:
  workflow_dispatch:
  push:
    branches: [main, develop, stage]
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

jobs:
  lint-type-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=critical --omit=dev

      - name: Lint
        run: doppler run -- npm run lint

      - name: Typecheck
        run: doppler run -- npm run typecheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Run unit tests
        run: doppler run -- npm test -- --ci --coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: false

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  chromatic:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Chromatic
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: storybook:build
          exitZeroOnChanges: true
          autoAcceptChanges: main
          onlyChanged: true
          skip: ${{ github.event.pull_request.draft }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  e2e-web:
    runs-on: ubuntu-latest
    needs: [lint-type-build, unit-test]
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Wrap Chrome for headless CI
        run: |
          sudo mv /usr/bin/google-chrome /usr/bin/google-chrome.original
          printf '#!/bin/sh\nexec /usr/bin/google-chrome.original "$@" --no-sandbox --headless=new --disable-dev-shm-usage --disable-gpu\n' | sudo tee /usr/bin/google-chrome
          sudo chmod +x /usr/bin/google-chrome

      - name: Build Storybook
        run: doppler run -- npm run storybook:build

      - name: Serve Storybook and run E2E
        id: e2e
        continue-on-error: true
        run: |
          npx http-server storybook-static -p 6006 &
          sleep 5
          mkdir -p e2e-results
          doppler run -- maestro test --platform web --format junit --output e2e-results/results.xml e2e/integration/ e2e/journeys/

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results/

      - name: Fail if E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1

