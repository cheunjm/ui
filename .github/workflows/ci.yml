name: CI
# Native visual regression with EAS build + simctl screenshots

on:
  workflow_dispatch:
  push:
    branches: [main, develop, stage]
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

jobs:
  lint-type-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Lint
        run: doppler run -- npm run lint

      - name: Typecheck
        run: doppler run -- npm run typecheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Run unit tests
        run: doppler run -- npm test -- --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Cache coverage baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: coverage/coverage-summary.json
          key: coverage-baseline-${{ github.sha }}

      - name: Prepare coverage PR data
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/coverage-summary.json';
            const output = { available: false, total: null, files: null };

            if (fs.existsSync(summaryPath)) {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              output.available = true;
              output.total = summary.total;
              const cwd = process.cwd() + '/';
              const files = {};
              for (const [key, value] of Object.entries(summary)) {
                if (key !== 'total') {
                  const relative = key.startsWith(cwd) ? key.slice(cwd.length) : key;
                  files[relative] = value;
                }
              }
              output.files = files;
            }

            fs.mkdirSync('pr-data', { recursive: true });
            fs.writeFileSync('pr-data/coverage.json', JSON.stringify(output));

      - name: Upload coverage PR data
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-data-coverage
          path: pr-data/coverage.json

  visual-baseline:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Build Storybook
        run: doppler run -- npm run storybook:build

      - name: Generate baseline screenshots
        uses: lost-pixel/lost-pixel@v3.22.0
        env:
          LOST_PIXEL_MODE: update

      - name: Save baselines to cache
        uses: actions/cache/save@v4
        with:
          path: .lostpixel/baseline/
          key: lost-pixel-baselines-${{ github.sha }}

  visual-regression:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Build Storybook
        run: doppler run -- npm run storybook:build

      - name: Restore baselines from cache
        uses: actions/cache/restore@v4
        with:
          path: .lostpixel/baseline/
          key: lost-pixel-baselines-
          restore-keys: |
            lost-pixel-baselines-

      - name: Run Lost Pixel comparison
        id: lostpixel
        uses: lost-pixel/lost-pixel@v3.22.0
        env:
          LOST_PIXEL_GENERATE_META: "true"
        continue-on-error: true

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lost-pixel-diffs
          path: |
            .lostpixel/current/
            .lostpixel/difference/

      - name: Prepare visual PR data
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metaPath = '.lostpixel/current/meta.json';
            const output = {
              outcome: '${{ steps.lostpixel.outcome }}',
              entries: null,
              baselineExists: fs.existsSync('.lostpixel/baseline'),
            };

            if (fs.existsSync(metaPath)) {
              output.entries = JSON.parse(fs.readFileSync(metaPath, 'utf8'));
            }

            fs.mkdirSync('pr-data', { recursive: true });
            fs.writeFileSync('pr-data/visual.json', JSON.stringify(output));

      - name: Upload visual PR data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-data-visual
          path: pr-data/visual.json

  e2e-web:
    runs-on: ubuntu-latest
    needs: [lint-type-build, unit-test]
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/cli-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: doppler run -- npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Wrap Chrome for headless CI
        run: |
          sudo mv /usr/bin/google-chrome /usr/bin/google-chrome.original
          printf '#!/bin/sh\nexec /usr/bin/google-chrome.original "$@" --no-sandbox --headless=new --disable-dev-shm-usage --disable-gpu\n' | sudo tee /usr/bin/google-chrome
          sudo chmod +x /usr/bin/google-chrome

      - name: Build Storybook
        run: doppler run -- npm run storybook:build

      - name: Serve Storybook and run E2E
        id: e2e
        continue-on-error: true
        run: |
          npx http-server storybook-static -p 6006 &
          sleep 5
          mkdir -p e2e-results
          doppler run -- maestro test --platform web --format junit --output e2e-results/results.xml e2e/integration/ e2e/journeys/

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results/

      - name: Prepare E2E PR data
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xmlPath = 'e2e-results/results.xml';
            const output = { available: false, totalTests: 0, totalFailures: 0, testCases: [] };

            if (fs.existsSync(xmlPath)) {
              const xml = fs.readFileSync(xmlPath, 'utf8');
              output.available = true;

              const suitesMatch = xml.match(/testsuite[^>]+tests="(\d+)"[^>]+failures="(\d+)"/g) || [];
              for (const s of suitesMatch) {
                const tests = s.match(/tests="(\d+)"/);
                const failures = s.match(/failures="(\d+)"/);
                if (tests) output.totalTests += parseInt(tests[1]);
                if (failures) output.totalFailures += parseInt(failures[1]);
              }

              const testCases = [...xml.matchAll(/<testcase\s+name="([^"]+)"[^>]*(?:\s+time="([^"]+)")?[^>]*(?:\/>|>([\s\S]*?)<\/testcase>)/g)];
              for (const tc of testCases) {
                const hasFailure = tc[3] && tc[3].includes('<failure');
                const failureMatch = tc[3] && tc[3].match(/<failure[^>]*(?:message="([^"]*)")?[^>]*>([^<]*)/);
                output.testCases.push({
                  name: tc[1],
                  time: tc[2] ? parseFloat(tc[2]).toFixed(1) : null,
                  passed: !hasFailure,
                  failureMessage: hasFailure ? (failureMatch ? (failureMatch[2] || failureMatch[1] || 'Unknown failure') : 'Unknown failure') : null,
                });
              }
            }

            fs.mkdirSync('pr-data', { recursive: true });
            fs.writeFileSync('pr-data/e2e.json', JSON.stringify(output));

      - name: Upload E2E PR data
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-data-e2e
          path: pr-data/e2e.json

      - name: Fail if E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1

  visual-baseline-ios:
    continue-on-error: true
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: rm -rf node_modules && npm ci

      - name: Build standalone iOS app
        run: |
          npm install -g eas-cli
          eas build --profile visual-test --platform ios --local --non-interactive --output build/ios-app.tar.gz

      - name: Boot simulator, install and launch
        run: |
          xcrun simctl boot "iPhone 15 Pro" 2>/dev/null || true
          xcrun simctl bootstatus "iPhone 15 Pro" -b
          mkdir -p build/ios-extracted
          tar xzf build/ios-app.tar.gz -C build/ios-extracted
          APP_PATH=$(find build/ios-extracted -name "*.app" -maxdepth 1 | head -1)
          xcrun simctl uninstall "iPhone 15 Pro" com.aramiworks.ui.storybook 2>/dev/null || true
          xcrun simctl install "iPhone 15 Pro" "$APP_PATH"
          xcrun simctl launch "iPhone 15 Pro" com.aramiworks.ui.storybook
          sleep 10

      - name: Take screenshots
        run: |
          mkdir -p .lostpixel-ios/baseline
          bash scripts/ios-visual-screenshots.sh "$(xcrun simctl list devices booted | grep 'iPhone 15 Pro' | grep -oE '[0-9A-F-]{36}' | head -1)" .lostpixel-ios/baseline

      - name: Save iOS baselines to cache
        uses: actions/cache/save@v4
        with:
          path: .lostpixel-ios/baseline/
          key: lost-pixel-baselines-ios-${{ github.sha }}

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown all 2>/dev/null || true

  visual-regression-ios:
    continue-on-error: true
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: rm -rf node_modules && npm ci

      - name: Build standalone iOS app
        run: |
          npm install -g eas-cli
          eas build --profile visual-test --platform ios --local --non-interactive --output build/ios-app.tar.gz

      - name: Boot simulator, install and launch
        run: |
          xcrun simctl boot "iPhone 15 Pro" 2>/dev/null || true
          xcrun simctl bootstatus "iPhone 15 Pro" -b
          mkdir -p build/ios-extracted
          tar xzf build/ios-app.tar.gz -C build/ios-extracted
          APP_PATH=$(find build/ios-extracted -name "*.app" -maxdepth 1 | head -1)
          xcrun simctl uninstall "iPhone 15 Pro" com.aramiworks.ui.storybook 2>/dev/null || true
          xcrun simctl install "iPhone 15 Pro" "$APP_PATH"
          xcrun simctl launch "iPhone 15 Pro" com.aramiworks.ui.storybook
          sleep 10

      - name: Restore iOS baselines from cache
        uses: actions/cache/restore@v4
        with:
          path: .lostpixel-ios/baseline/
          key: lost-pixel-baselines-ios-
          restore-keys: |
            lost-pixel-baselines-ios-

      - name: Take screenshots
        id: ios_screenshots
        continue-on-error: true
        run: |
          UDID=$(xcrun simctl list devices booted | grep 'iPhone 15 Pro' | grep -oE '[0-9A-F-]{36}' | head -1)
          mkdir -p .lostpixel-ios/current
          bash scripts/ios-visual-screenshots.sh "$UDID" .lostpixel-ios/current

      - name: Compare iOS screenshots
        id: ios_diff
        continue-on-error: true
        run: |
          mkdir -p .lostpixel-ios/difference
          node -e "
            const fs = require('fs');
            const path = require('path');
            const baselineDir = '.lostpixel-ios/baseline';
            const currentDir = '.lostpixel-ios/current';
            const diffDir = '.lostpixel-ios/difference';
            const results = {};

            if (!fs.existsSync(baselineDir) || fs.readdirSync(baselineDir).length === 0) {
              console.log('No baselines found — skipping comparison');
              fs.writeFileSync('.lostpixel-ios/meta.json', JSON.stringify({ _noBaselines: true }));
              process.exit(0);
            }

            const baselineFiles = fs.readdirSync(baselineDir).filter(f => f.endsWith('.png'));
            const currentFiles = fs.readdirSync(currentDir).filter(f => f.endsWith('.png'));
            let hasChanges = false;

            for (const file of new Set([...baselineFiles, ...currentFiles])) {
              const bPath = path.join(baselineDir, file);
              const cPath = path.join(currentDir, file);
              const name = file.replace('.png', '');

              if (!fs.existsSync(bPath)) {
                results[name] = { status: 'new', pixelDifference: 0, pixelDifferencePercentage: 0 };
                hasChanges = true;
              } else if (!fs.existsSync(cPath)) {
                results[name] = { status: 'removed', pixelDifference: 0, pixelDifferencePercentage: 0 };
                hasChanges = true;
              } else {
                const b = fs.readFileSync(bPath);
                const c = fs.readFileSync(cPath);
                if (Buffer.compare(b, c) !== 0) {
                  results[name] = { status: 'changed', pixelDifference: -1, pixelDifferencePercentage: -1 };
                  fs.copyFileSync(cPath, path.join(diffDir, file));
                  hasChanges = true;
                } else {
                  results[name] = { status: 'unchanged', pixelDifference: 0, pixelDifferencePercentage: 0 };
                }
              }
            }

            fs.writeFileSync('.lostpixel-ios/meta.json', JSON.stringify(results, null, 2));
            if (hasChanges) process.exit(1);
          "

      - name: Upload iOS visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lost-pixel-diffs-ios
          path: |
            .lostpixel-ios/current/
            .lostpixel-ios/difference/

      - name: Prepare iOS visual PR data
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = {
              screenshotOutcome: '${{ steps.ios_screenshots.outcome }}',
              diffOutcome: '${{ steps.ios_diff.outcome }}',
              entries: null,
              noBaselines: false,
            };
            const metaPath = '.lostpixel-ios/meta.json';
            if (fs.existsSync(metaPath)) {
              const meta = JSON.parse(fs.readFileSync(metaPath, 'utf8'));
              if (meta._noBaselines) {
                output.noBaselines = true;
              } else {
                output.entries = meta;
              }
            }
            fs.mkdirSync('pr-data', { recursive: true });
            fs.writeFileSync('pr-data/visual-ios.json', JSON.stringify(output));

      - name: Upload iOS visual PR data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-data-visual-ios
          path: pr-data/visual-ios.json

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown all 2>/dev/null || true

  visual-baseline-android:
    # TODO: remove continue-on-error after INF-421 (worklets/reanimated fix) + AVD setup
    continue-on-error: true
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: rm -rf node_modules && npm ci

      - name: Start Android emulator
        run: |
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          export PATH="$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$PATH"
          emulator -avd Pixel_7_API_34 -no-window -no-audio -no-boot-anim &
          adb wait-for-device
          adb shell input keyevent 82

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Android app
        run: npx expo run:android

      - name: Run visual screenshot flow
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p .lostpixel-android/baseline
          maestro test --platform android e2e/visual/screenshot-all-stories-android.yaml
          cp -f ~/.maestro/tests/*/screenshots/*.png .lostpixel-android/baseline/ 2>/dev/null || true

      - name: Save Android baselines to cache
        uses: actions/cache/save@v4
        with:
          path: .lostpixel-android/baseline/
          key: lost-pixel-baselines-android-${{ github.sha }}

      - name: Kill emulator
        if: always()
        run: adb emu kill 2>/dev/null || true

  visual-regression-android:
    # TODO: remove continue-on-error after INF-421 (worklets/reanimated fix) + AVD setup
    continue-on-error: true
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: rm -rf node_modules && npm ci

      - name: Start Android emulator
        run: |
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          export PATH="$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$PATH"
          emulator -avd Pixel_7_API_34 -no-window -no-audio -no-boot-anim &
          adb wait-for-device
          adb shell input keyevent 82

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Android app
        run: npx expo run:android

      - name: Restore Android baselines from cache
        uses: actions/cache/restore@v4
        with:
          path: .lostpixel-android/baseline/
          key: lost-pixel-baselines-android-
          restore-keys: |
            lost-pixel-baselines-android-

      - name: Run visual screenshot flow
        id: android_screenshots
        continue-on-error: true
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p .lostpixel-android/current
          maestro test --platform android e2e/visual/screenshot-all-stories-android.yaml
          cp -f ~/.maestro/tests/*/screenshots/*.png .lostpixel-android/current/ 2>/dev/null || true

      - name: Compare Android screenshots
        id: android_diff
        continue-on-error: true
        run: |
          mkdir -p .lostpixel-android/difference
          node -e "
            const fs = require('fs');
            const path = require('path');
            const baselineDir = '.lostpixel-android/baseline';
            const currentDir = '.lostpixel-android/current';
            const diffDir = '.lostpixel-android/difference';
            const results = {};

            if (!fs.existsSync(baselineDir) || fs.readdirSync(baselineDir).length === 0) {
              fs.writeFileSync('.lostpixel-android/meta.json', JSON.stringify({ _noBaselines: true }));
              process.exit(0);
            }

            const baselineFiles = fs.readdirSync(baselineDir).filter(f => f.endsWith('.png'));
            const currentFiles = fs.readdirSync(currentDir).filter(f => f.endsWith('.png'));
            let hasChanges = false;

            for (const file of new Set([...baselineFiles, ...currentFiles])) {
              const bPath = path.join(baselineDir, file);
              const cPath = path.join(currentDir, file);
              const name = file.replace('.png', '');

              if (!fs.existsSync(bPath)) {
                results[name] = { status: 'new' };
                hasChanges = true;
              } else if (!fs.existsSync(cPath)) {
                results[name] = { status: 'removed' };
                hasChanges = true;
              } else {
                const b = fs.readFileSync(bPath);
                const c = fs.readFileSync(cPath);
                if (Buffer.compare(b, c) !== 0) {
                  results[name] = { status: 'changed' };
                  fs.copyFileSync(cPath, path.join(diffDir, file));
                  hasChanges = true;
                } else {
                  results[name] = { status: 'unchanged' };
                }
              }
            }

            fs.writeFileSync('.lostpixel-android/meta.json', JSON.stringify(results, null, 2));
            if (hasChanges) process.exit(1);
          "

      - name: Upload Android visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lost-pixel-diffs-android
          path: |
            .lostpixel-android/current/
            .lostpixel-android/difference/

      - name: Prepare Android visual PR data
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = {
              screenshotOutcome: '${{ steps.android_screenshots.outcome }}',
              diffOutcome: '${{ steps.android_diff.outcome }}',
              entries: null,
              noBaselines: false,
            };
            const metaPath = '.lostpixel-android/meta.json';
            if (fs.existsSync(metaPath)) {
              const meta = JSON.parse(fs.readFileSync(metaPath, 'utf8'));
              if (meta._noBaselines) {
                output.noBaselines = true;
              } else {
                output.entries = meta;
              }
            }
            fs.mkdirSync('pr-data', { recursive: true });
            fs.writeFileSync('pr-data/visual-android.json', JSON.stringify(output));

      - name: Upload Android visual PR data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-data-visual-android
          path: pr-data/visual-android.json

      - name: Kill emulator
        if: always()
        run: adb emu kill 2>/dev/null || true

  pr-summary:
    if: always() && github.event_name == 'pull_request'
    needs: [unit-test, visual-regression, e2e-web, visual-regression-ios, visual-regression-android]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Download PR data artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: pr-data-*
          merge-multiple: true
          path: pr-data/

      - name: Restore coverage baseline from main
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: coverage-baseline/coverage-summary.json
          key: coverage-baseline-
          restore-keys: |
            coverage-baseline-

      - name: Post unified PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-summary-comment -->';
            let body = marker + '\n## CI Summary\n\n';

            // --- COVERAGE ---
            body += '### :bar_chart: Coverage\n\n';
            const cov = fs.existsSync('pr-data/coverage.json')
              ? JSON.parse(fs.readFileSync('pr-data/coverage.json', 'utf8'))
              : { available: false };

            if (!cov.available) {
              body += 'Coverage report not found — tests may have failed.\n\n';
            } else {
              let baseline = null;
              if (fs.existsSync('coverage-baseline/coverage-summary.json')) {
                baseline = JSON.parse(fs.readFileSync('coverage-baseline/coverage-summary.json', 'utf8')).total;
              }

              const delta = (current, base) => {
                if (!base) return '';
                const diff = current - base;
                if (Math.abs(diff) < 0.05) return '';
                const sign = diff > 0 ? '+' : '';
                const icon = diff > 0 ? ':green_circle:' : diff < -1 ? ':red_circle:' : ':yellow_circle:';
                return `${icon} (${sign}${diff.toFixed(1)}%)`;
              };

              body += '| Metric | Coverage | Delta | Covered/Total |\n';
              body += '|--------|----------|-------|---------------|\n';
              for (const metric of ['statements', 'branches', 'functions', 'lines']) {
                const m = cov.total[metric];
                const d = baseline ? delta(m.pct, baseline[metric].pct) : '';
                const label = metric[0].toUpperCase() + metric.slice(1);
                body += `| ${label} | ${m.pct}% | ${d} | ${m.covered}/${m.total} |\n`;
              }

              const files = Object.entries(cov.files || {});
              if (files.length > 0) {
                files.sort((a, b) => a[1].lines.pct - b[1].lines.pct);
                const top = files.slice(0, 10);
                body += '\n<details>\n<summary>Lowest coverage files</summary>\n\n';
                body += '| File | Statements | Branches | Lines |\n';
                body += '|------|-----------|----------|-------|\n';
                for (const [path, data] of top) {
                  body += `| \`${path}\` | ${data.statements.pct}% | ${data.branches.pct}% | ${data.lines.pct}% |\n`;
                }
                body += '\n</details>\n';
              }
              body += '\n';
            }

            // --- VISUAL REGRESSION (WEB) ---
            body += '### :art: Visual Regression (Web)\n\n';
            const vis = fs.existsSync('pr-data/visual.json')
              ? JSON.parse(fs.readFileSync('pr-data/visual.json', 'utf8'))
              : null;

            if (!vis) {
              body += 'Visual regression data not available.\n\n';
            } else if (vis.outcome === 'success') {
              body += ':white_check_mark: All screenshots match the baseline.\n\n';
            } else {
              body += ':warning: **Changes detected**\n\n';
              if (vis.entries) {
                const entries = Object.entries(vis.entries);
                const changed = entries.filter(([, v]) => !v.isWithinThreshold);
                body += '| Shot | Pixel Diff | % Diff | Status |\n';
                body += '|------|-----------|--------|--------|\n';
                for (const [name, data] of entries) {
                  const pct = (data.pixelDifferencePercentage * 100).toFixed(2);
                  const status = data.isWithinThreshold ? ':yellow_circle: Within threshold' : ':red_circle: Changed';
                  body += `| \`${name}\` | ${data.pixelDifference} | ${pct}% | ${status} |\n`;
                }
                body += `\n**${changed.length} shot(s) changed** beyond threshold.\n`;
              } else if (!vis.baselineExists) {
                body += ':information_source: No baselines found — expected for first PR.\n';
              }
              const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              body += `\n:frame_with_picture: [Download diff images](${artifactUrl})\n\n`;
            }

            // --- VISUAL REGRESSION (iOS) ---
            body += '### :iphone: Visual Regression (iOS)\n\n';
            const visIos = fs.existsSync('pr-data/visual-ios.json')
              ? JSON.parse(fs.readFileSync('pr-data/visual-ios.json', 'utf8'))
              : null;

            if (!visIos) {
              body += 'iOS visual data not available.\n\n';
            } else if (visIos.screenshotOutcome !== 'success') {
              body += 'Screenshot capture failed. Check artifacts.\n\n';
            } else if (visIos.diffOutcome === 'success') {
              body += ':white_check_mark: All iOS screenshots match the baseline.\n\n';
            } else if (visIos.noBaselines) {
              body += ':information_source: No baselines found — expected for first PR.\n\n';
            } else if (visIos.entries) {
              const entries = Object.entries(visIos.entries);
              const changed = entries.filter(([, v]) => v.status !== 'unchanged');
              body += '| Shot | Status |\n';
              body += '|------|--------|\n';
              for (const [name, data] of entries) {
                let status = ':green_circle: Unchanged';
                if (data.status === 'changed') status = ':red_circle: Changed';
                else if (data.status === 'new') status = ':blue_circle: New';
                else if (data.status === 'removed') status = ':white_circle: Removed';
                body += `| \`${name}\` | ${status} |\n`;
              }
              body += `\n**${changed.length} shot(s) changed.**\n\n`;
            }

            // --- VISUAL REGRESSION (Android) ---
            body += '### :robot: Visual Regression (Android)\n\n';
            const visAndroid = fs.existsSync('pr-data/visual-android.json')
              ? JSON.parse(fs.readFileSync('pr-data/visual-android.json', 'utf8'))
              : null;

            if (!visAndroid) {
              body += 'Android visual data not available.\n\n';
            } else if (visAndroid.screenshotOutcome !== 'success') {
              body += 'Screenshot capture failed. Check artifacts.\n\n';
            } else if (visAndroid.diffOutcome === 'success') {
              body += ':white_check_mark: All Android screenshots match the baseline.\n\n';
            } else if (visAndroid.noBaselines) {
              body += ':information_source: No baselines found — expected for first PR.\n\n';
            } else if (visAndroid.entries) {
              const entries = Object.entries(visAndroid.entries);
              const changed = entries.filter(([, v]) => v.status !== 'unchanged');
              body += '| Shot | Status |\n';
              body += '|------|--------|\n';
              for (const [name, data] of entries) {
                let status = ':green_circle: Unchanged';
                if (data.status === 'changed') status = ':red_circle: Changed';
                else if (data.status === 'new') status = ':blue_circle: New';
                else if (data.status === 'removed') status = ':white_circle: Removed';
                body += `| \`${name}\` | ${status} |\n`;
              }
              body += `\n**${changed.length} shot(s) changed.**\n\n`;
            }

            // --- E2E TESTS ---
            body += '### :test_tube: E2E Tests\n\n';
            const e2e = fs.existsSync('pr-data/e2e.json')
              ? JSON.parse(fs.readFileSync('pr-data/e2e.json', 'utf8'))
              : null;

            if (!e2e || !e2e.available) {
              body += 'E2E results not available.\n';
            } else {
              const passed = e2e.totalTests - e2e.totalFailures;
              const icon = e2e.totalFailures > 0 ? ':x:' : ':white_check_mark:';
              body += `${icon} **${passed}/${e2e.totalTests}** tests passed`;
              if (e2e.totalFailures > 0) body += ` — **${e2e.totalFailures} failed**`;
              body += '\n\n';
              if (e2e.testCases.length > 0) {
                body += '| Test | Duration | Status |\n';
                body += '|------|----------|--------|\n';
                for (const tc of e2e.testCases) {
                  const time = tc.time ? `${tc.time}s` : '-';
                  const status = tc.passed ? ':green_circle: Passed' : ':red_circle: Failed';
                  body += `| \`${tc.name}\` | ${time} | ${status} |\n`;
                }
              }
              const failures = e2e.testCases.filter(tc => !tc.passed && tc.failureMessage);
              if (failures.length > 0) {
                body += '\n<details>\n<summary>Failure details</summary>\n\n';
                for (const tc of failures) {
                  body += `**\`${tc.name}\`**\n\`\`\`\n${tc.failureMessage}\n\`\`\`\n\n`;
                }
                body += '</details>\n';
              }
            }

            // --- POST COMMENT ---
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

            // --- CLEAN UP OLD COMMENTS ---
            const oldMarkers = ['<!-- coverage-comment -->', '<!-- lost-pixel-comment -->', '<!-- e2e-comment -->', '<!-- lost-pixel-ios-comment -->', '<!-- lost-pixel-android-comment -->'];
            for (const old of oldMarkers) {
              const stale = comments.find(c => c.body.includes(old));
              if (stale) {
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: stale.id });
              }
            }
