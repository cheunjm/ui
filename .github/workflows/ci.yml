name: CI
# Native visual regression with EAS build + simctl screenshots

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - ".changeset/**"
      - "CHANGELOG.md"
      - "**.md"

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --audit-level=critical --omit=dev

  lint:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  format:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check

  type-check:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  test:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test -- --ci --coverage
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: false
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Storybook
        run: npm run storybook:build

  paths-filter:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'scripts/**'
              - '.storybook/**'
              - '.ondevice/**'
              - 'e2e/**'
              - 'App.tsx'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'eslint.config.mjs'
              - 'jest.config.ts'
              - 'jest.setup.ts'
              - 'babel.config.js'
              - 'vite.config.ts'
              - '.prettierrc.json'
            deps:
              - 'package.json'
              - 'package-lock.json'
            src:
              - 'src/**'
              - '.storybook/**'

  chromatic:
    needs: [paths-filter]
    if: (github.event_name == 'pull_request' && needs.paths-filter.outputs.src == 'true') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Chromatic
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: storybook:build
          autoAcceptChanges: main
          onlyChanged: true
          skip: ${{ github.event.pull_request.draft }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  e2e-web:
    needs: [paths-filter, lint, type-check, test]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Wrap Chrome for headless CI
        run: |
          sudo mv /usr/bin/google-chrome /usr/bin/google-chrome.original
          printf '#!/bin/sh\nexec /usr/bin/google-chrome.original "$@" --no-sandbox --headless=new --disable-dev-shm-usage --disable-gpu\n' | sudo tee /usr/bin/google-chrome
          sudo chmod +x /usr/bin/google-chrome
      - name: Build Storybook
        run: npm run storybook:build
      - name: Serve Storybook and run E2E
        id: e2e
        continue-on-error: true
        run: |
          npx http-server storybook-static -p 6006 &
          sleep 5
          mkdir -p e2e-results
          maestro test --platform web --format junit --output e2e-results/results.xml e2e/integration/ e2e/journeys/
      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results/
      - name: Fail if E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1

  ci-status:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - paths-filter
      - audit
      - lint
      - format
      - type-check
      - test
      - build
      - chromatic
      - e2e-web
    if: always()
    steps:
      - name: Check all CI jobs
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"
