name: EAS Update (OTA)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'app.config.js'
      - '.ondevice/**'

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      channel:
        description: "EAS update channel"
        required: true
        type: choice
        options:
          - develop
          - stage
          - master

jobs:
  update:
    if: >-
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore: version packages'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Resolve channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG##*@}"
            if [[ "$VERSION" == *-dev.* ]]; then
              echo "name=develop" >> "$GITHUB_OUTPUT"
            elif [[ "$VERSION" == *-rc.* ]]; then
              echo "name=stage" >> "$GITHUB_OUTPUT"
            else
              echo "name=master" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "name=master" >> "$GITHUB_OUTPUT"
          fi

      - name: Read package version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate Storybook requires
        run: npm run storybook:generate

      - name: Publish OTA update
        run: |
          eas update \
            --channel ${{ steps.channel.outputs.name }} \
            --message "v${{ steps.version.outputs.version }} — ${{ github.event.head_commit.message || github.event.release.name || 'manual dispatch' }}" \
            --non-interactive
