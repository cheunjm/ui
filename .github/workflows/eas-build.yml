name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        type: choice
        options:
          - master
          - stage
          - develop
        default: master
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - web
        default: all

  release:
    types: [published]

concurrency:
  group: eas-build-${{ inputs.profile || github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  resolve-params:
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.params.outputs.profile }}
      platform: ${{ steps.params.outputs.platform }}
    steps:
      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG##*@}"

            if [[ "$VERSION" == *-dev.* ]]; then
              echo "profile=develop" >> "$GITHUB_OUTPUT"
            elif [[ "$VERSION" == *-rc.* ]]; then
              echo "profile=stage" >> "$GITHUB_OUTPUT"
            else
              echo "profile=master" >> "$GITHUB_OUTPUT"
            fi
            echo "platform=all" >> "$GITHUB_OUTPUT"
          fi

  native:
    needs: [resolve-params]
    if: needs.resolve-params.outputs.platform != 'web'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        platform: ${{ needs.resolve-params.outputs.platform == 'all' && fromJSON('["android", "ios"]') || fromJSON(format('["{0}"]', needs.resolve-params.outputs.platform)) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: eas-build
        run: |
          eas build \
            --profile ${{ needs.resolve-params.outputs.profile }} \
            --platform ${{ matrix.platform }} \
            --non-interactive \
            --json | tee /tmp/eas-build-result.json
          BUILD_URL=$(cat /tmp/eas-build-result.json | jq -r '.[0].buildDetailsPageUrl // empty')
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅' || '❌' }}"
          PLATFORM="${{ matrix.platform }}"
          PROFILE="${{ needs.resolve-params.outputs.profile }}"
          BUILD_URL="${{ steps.eas-build.outputs.build_url }}"
          FALLBACK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LINK="${BUILD_URL:-$FALLBACK}"

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0AJD47H6R4\",
              \"text\": \"${STATUS} *EAS Build* — @aramiworks/ui ${PLATFORM} (${PROFILE})\n• <${LINK}|View build>\"
            }"

  web:
    needs: [resolve-params]
    if: needs.resolve-params.outputs.platform == 'all' || needs.resolve-params.outputs.platform == 'web'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Storybook requires
        run: npm run storybook:generate

      - name: Export web build
        run: npx expo export --platform web

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ needs.resolve-params.outputs.profile }}
          path: dist/

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅' || '❌' }}"
          PROFILE="${{ needs.resolve-params.outputs.profile }}"
          LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0AJD47H6R4\",
              \"text\": \"${STATUS} *EAS Build* — @aramiworks/ui web (${PROFILE})\n• <${LINK}|View build>\"
            }"
