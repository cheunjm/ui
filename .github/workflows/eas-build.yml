name: EAS Build (iOS & Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.profile.outputs.name }}
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Map branch to EAS profile
        id: profile
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "name=production" >> $GITHUB_OUTPUT ;;
            stage)   echo "name=stage" >> $GITHUB_OUTPUT ;;
            develop) echo "name=develop" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run EAS Build
        run: |
          eas build \
            --platform ${{ matrix.platform }} \
            --profile ${{ steps.profile.outputs.name }} \
            --non-interactive

  notify:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Notify Slack
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            STATUS="✅ *EAS Build complete*"
          else
            STATUS="❌ *EAS Build failed*"
          fi
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0AH9QDT2SW\",
              \"text\": \"${STATUS} — @aramiworks/ui\n• Platforms: iOS & Android\n• Profile: ${{ needs.build.outputs.profile }}\n• Branch: ${{ github.ref_name }}\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"
            }"
