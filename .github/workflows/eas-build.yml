name: EAS Build (iOS & Android)

on:
  push:
    branches: [main, develop, stage]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Map branch to EAS profile
        id: profile
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "name=production" >> $GITHUB_OUTPUT ;;
            stage)   echo "name=stage" >> $GITHUB_OUTPUT ;;
            develop) echo "name=develop" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run EAS Build
        run: |
          eas build \
            --platform ${{ matrix.platform }} \
            --profile ${{ steps.profile.outputs.name }} \
            --non-interactive \
            --no-wait
