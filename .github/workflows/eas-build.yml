name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        type: choice
        options:
          - master
          - stage
          - develop
        default: master
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - web
        default: all

  release:
    types: [published]

concurrency:
  group: eas-build-${{ inputs.profile || github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  resolve-params:
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.params.outputs.profile }}
      platform: ${{ steps.params.outputs.platform }}
    steps:
      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG##*@}"

            if [[ "$VERSION" == *-dev.* ]]; then
              echo "profile=develop" >> "$GITHUB_OUTPUT"
            elif [[ "$VERSION" == *-rc.* ]]; then
              echo "profile=stage" >> "$GITHUB_OUTPUT"
            else
              echo "profile=master" >> "$GITHUB_OUTPUT"
            fi
            echo "platform=all" >> "$GITHUB_OUTPUT"
          fi

  native:
    needs: [resolve-params]
    if: needs.resolve-params.outputs.platform != 'web'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        platform: ${{ needs.resolve-params.outputs.platform == 'all' && fromJSON('["android", "ios"]') || fromJSON(format('["{0}"]', needs.resolve-params.outputs.platform)) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: eas-build
        run: |
          eas build \
            --profile ${{ needs.resolve-params.outputs.profile }} \
            --platform ${{ matrix.platform }} \
            --non-interactive \
            --json | tee /tmp/eas-build-result.json
          BUILD_ID=$(cat /tmp/eas-build-result.json | jq -r '.[0].id // empty')
          BUILD_STATUS=$(cat /tmp/eas-build-result.json | jq -r '.[0].status // empty')
          if [ -n "$BUILD_ID" ]; then
            echo "build_url=https://expo.dev/accounts/aramiworks/projects/cheunjm-ui/builds/$BUILD_ID" >> "$GITHUB_OUTPUT"
          fi
          if [ "$BUILD_STATUS" = "ERRORED" ]; then
            echo "EAS build errored on Expo servers" >&2
            exit 1
          fi

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅' || '❌' }}"
          PLATFORM="${{ matrix.platform }}"
          PROFILE="${{ needs.resolve-params.outputs.profile }}"
          BUILD_URL="${{ steps.eas-build.outputs.build_url }}"
          FALLBACK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LINK="${BUILD_URL:-$FALLBACK}"

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0AJD47H6R4\",
              \"text\": \"${STATUS} *@aramiworks/ui Build*\n📱 Platform: ${PLATFORM^}\n🎯 Profile: ${PROFILE}\n🔗 <${LINK}|View on Expo>\"
            }"

  web:
    needs: [resolve-params]
    if: needs.resolve-params.outputs.platform == 'all' || needs.resolve-params.outputs.platform == 'web'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run storybook:build

      - name: Resolve deploy domain
        id: domain
        run: |
          PROFILE="${{ needs.resolve-params.outputs.profile }}"
          case "$PROFILE" in
            develop) echo "url=develop.storybook.ui.arami.so" >> "$GITHUB_OUTPUT" ;;
            stage)   echo "url=stage.storybook.ui.arami.so" >> "$GITHUB_OUTPUT" ;;
            *)       echo "url=storybook.ui.arami.so" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Configure Vercel project
        working-directory: storybook-static
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          jq -n --arg org "$VERCEL_ORG_ID" --arg proj "$VERCEL_PROJECT_ID" '{"orgId":$org,"projectId":$proj}' > .vercel/project.json

      - name: Deploy to Vercel
        id: deploy
        working-directory: storybook-static
        env:
          PROFILE: ${{ needs.resolve-params.outputs.profile }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          PROD_FLAG=""
          if [ "$PROFILE" = "master" ]; then
            PROD_FLAG="--prod"
          fi
          DEPLOY_URL=$(npx vercel deploy --yes $PROD_FLAG \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          if [ "$PROFILE" != "master" ]; then
            npx vercel alias "$DEPLOY_URL" "${{ steps.domain.outputs.url }}" \
              --scope=aramiworks \
              --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅' || '❌' }}"
          PROFILE="${{ needs.resolve-params.outputs.profile }}"
          DOMAIN="${{ steps.domain.outputs.url }}"

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0AJD47H6R4\",
              \"text\": \"${STATUS} *@aramiworks/ui Build*\n🌐 Platform: Web\n🎯 Profile: ${PROFILE}\n🔗 <https://${DOMAIN}|${DOMAIN}>\"
            }"
